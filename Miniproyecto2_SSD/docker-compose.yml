version: '3.8'

services:
  # Proxy Reverso - Único punto expuesto al exterior
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend SPA React/Vite
  frontend:
    build: ./frontend
    container_name: frontend_spa
    depends_on:
      - backend
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend FastAPI - API FHIR + Auth
  backend:
    build: ./backend
    container_name: backend_api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DEFAULT_ACCESS_KEY=${DEFAULT_ACCESS_KEY}
      - DEFAULT_PERMISSION_KEY=${DEFAULT_PERMISSION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=clinical-images
      - MAILHOG_HOST=mailhog
      - MAILHOG_PORT=1025
      - FHIR_SERVER_URL=http://fhir-server:8080/fhir
      - ENV=development
    depends_on:
      - minio
      - mailhog
    ports:
      - '8000:8000'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # HAPI FHIR Server R4
  fhir-server:
    image: hapiproject/hapi:latest
    container_name: fhir_hapi
    environment:
      - HAPI_PORT=8080
    ports:
      - '8080:8080'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ML Service - Tabular XGBoost ONNX
  ml-service:
    build: ./ml-service
    container_name: ml_service
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    ports:
      - '8001:8001'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DL Service - EfficientNet INT8 ONNX
  dl-service:
    build: ./dl-service
    container_name: dl_service
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=clinical-images
    depends_on:
      - minio
    ports:
      - '8003:8003'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Orchestrator - Concurrencia asyncio(4)
  orchestrator:
    build: ./orchestrator
    container_name: orchestrator_async
    environment:
      - MAX_WORKERS=4
    depends_on:
      - ml-service
      - dl-service
    ports:
      - '8002:8002'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO S3 - Almacenamiento Imágenes
  minio:
    image: minio/minio:latest
    container_name: minio_s3
    command: minio server /data --console-address ":9001"
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Init - Crear bucket clinical-images
  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb minio/clinical-images || true;
      exit 0;
      "
    networks:
      - clinical_net

  # PostgreSQL - Base de datos normalizada
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=clinical_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d clinical_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MLflow - Model Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_tracking
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    volumes:
      - mlflow_data:/mlflow
    ports:
      - '5000:5000'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Mailhog - SMTP para alertas
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog_smtp
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - clinical_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  mlflow_data:
    driver: local

networks:
  clinical_net:
    driver: bridge

